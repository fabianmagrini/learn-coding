version: '3.9'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: devfoundry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devfoundry
      POSTGRES_USER: devfoundry
      POSTGRES_PASSWORD: devfoundry
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devfoundry']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for BullMQ queues
  redis:
    image: redis:7-alpine
    container_name: devfoundry-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: devfoundry-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: '5432'
      DATABASE_USERNAME: devfoundry
      DATABASE_PASSWORD: devfoundry
      DATABASE_NAME: devfoundry
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      API_PORT: '3000'
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_IN: '7d'
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/metrics/dashboard']
      interval: 30s
      timeout: 10s
      retries: 3

  # React web frontend
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: devfoundry-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:80'

volumes:
  postgres_data:
  redis_data:
